<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Stopwatch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="stopwatch-card">
            <h1 class="title">Stopwatch</h1>
            
            <div class="display-container">
                <div class="timer-glow"></div>
                <div id="display" class="timer">00:00:00:000</div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn btn-start">Start</button>
                <button id="pauseBtn" class="btn btn-pause" disabled>Pause</button>
                <button id="lapBtn" class="btn btn-lap" disabled>Lap</button>
                <button id="resetBtn" class="btn btn-reset">Reset</button>
            </div>

            <div class="laps-container">
                <div class="laps-header">
                    <span>Lap</span>
                    <span>Time</span>
                </div>
                <ul id="lapsList" class="laps-list">
                    <!-- Lap items will be added here -->
                </ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
